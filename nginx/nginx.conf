events {
    worker_connections 1024;
}

http {
    # ── MIME types ────────────────────────────────────────────────────────
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Docker DNS (still needed to resolve at runtime after restarts)
    resolver 127.0.0.11 valid=10s ipv6=off;

    # ── Proxy cache for immutable HLS segments ────────────────────────────
    # Segments are byte-identical on every request — cache them for 2 h.
    # /tmp is writable by the nginx user in the alpine image.
    proxy_cache_path /tmp/nginx_video_cache
                     levels=1:2
                     keys_zone=video_zone:20m
                     max_size=512m
                     inactive=2h
                     use_temp_path=off;

    # Skip the cache for playlists (.m3u8) — they must always be fresh.
    # Everything else (.m4s, .mp4, .ts) gets cached.
    map $uri $video_no_cache {
        default    0;
        ~*\.m3u8$  1;
    }

    # ── Named upstreams with persistent keepalive ─────────────────────────
    upstream streaming_backend {
        server streaming-service:8081;
        keepalive          32;
        keepalive_requests 1000;
        keepalive_timeout  75s;
    }
    upstream analytics_backend {
        server analytics-service:8083;
        keepalive          16;
        keepalive_requests 500;
        keepalive_timeout  75s;
    }

    server {
        listen 80;
        server_name localhost;

        # ── Video metadata / listing ──────────────────────────────────────────
        location /videos {
            proxy_pass         http://streaming_backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;

            add_header Access-Control-Allow-Origin  "*" always;
            add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type" always;
        }

        # ── HLS video + event endpoints ───────────────────────────────────────
        location /video/ {
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin  "*" always;
                add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With, Range" always;
                add_header Access-Control-Max-Age       86400 always;
                add_header Content-Length               0;
                return 204;
            }

            proxy_pass         http://streaming_backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # ── Buffering: ON so nginx can cache full segment responses ──
            # Spring Boot serves segments from RAM (Caffeine cache), so
            # the upstream response arrives almost instantly.
            proxy_buffering         on;
            proxy_buffer_size       128k;
            proxy_buffers           16 256k;
            proxy_busy_buffers_size 512k;
            proxy_request_buffering off;

            # ── Nginx proxy cache for segments ──────────────────────────
            proxy_cache              video_zone;
            proxy_cache_key          "$uri";
            proxy_cache_valid        200 2h;
            proxy_cache_bypass       $video_no_cache;
            proxy_no_cache           $video_no_cache;
            proxy_cache_use_stale    error timeout updating http_500 http_503;
            proxy_cache_lock         on;
            proxy_cache_lock_timeout 10s;
            add_header               X-Cache-Status "$upstream_cache_status" always;

            proxy_hide_header Content-Disposition;
            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Methods;
            proxy_hide_header Access-Control-Allow-Headers;

            add_header Access-Control-Allow-Origin  "*" always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With, Range" always;
        }

        # ── Internal API ──────────────────────────────────────────────────
        location /api/ {
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin  "*" always;
                add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With" always;
                add_header Access-Control-Max-Age       86400 always;
                add_header Content-Length               0;
                return 204;
            }

            proxy_pass         http://streaming_backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Methods;
            proxy_hide_header Access-Control-Allow-Headers;

            add_header Access-Control-Allow-Origin  "*" always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With" always;
        }

        # ── Analytics ─────────────────────────────────────────────────────
        location /analytics/ {
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin  "*" always;
                add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With" always;
                add_header Access-Control-Max-Age       86400 always;
                add_header Content-Length               0;
                return 204;
            }

            proxy_pass         http://analytics_backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Methods;
            proxy_hide_header Access-Control-Allow-Headers;

            add_header Access-Control-Allow-Origin  "*" always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With" always;
        }

        # ── Health ────────────────────────────────────────────────────────
        location /health {
            access_log off;
            proxy_pass         http://streaming_backend/actuator/health;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
        }

        # ── Frontend static files ─────────────────────────────────────────
        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "public, max-age=3600";
        }
    }
}
